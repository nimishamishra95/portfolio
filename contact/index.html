<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="../style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
</head>
<body>
    <h1>Contact</h1>
    <form action="mailto:n2mishra@ucsd.edu" method="POST" enctype="text/plain">
        <label>
            Your Email:
            <input type="email" name="email" required>
        </label>
        <label>
            Subject:
            <input name="subject" required>
        </label>
        <label>
            Message:
            <textarea name="body" rows="5" cols="40" required></textarea>
        </label>
        <button>Send</button>
    </form>
    <script src="/portfolio/global.js" type="module"></script>
</body>
</html>
